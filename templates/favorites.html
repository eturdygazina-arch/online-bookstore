{% extends "base.html" %}

{% block content %}
<h2>Избранное</h2>
<div class="row">
    {% for book in favorites %}
    <div class="col-md-3 mb-4">
        <div class="card h-100">
            <img src="{{ book.image_url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
            <div class="card-body">
                <h5>{{ book.title }}</h5>
                <p>{{ book.author }}</p>
                <p class="fw-bold">{{ book.price }} ₽</p>
                <a href="{{ url_for('book_detail', book_id=book._id) }}" class="btn btn-sm btn-primary">Подробнее</a>
                <a href="{{ url_for('toggle_favorite', book_id=book._id) }}" class="btn btn-sm btn-danger">Удалить</a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12"><div class="alert alert-info">Нет избранных книг.</div></div>
    {% endfor %}
</div>
{% endblock %}
