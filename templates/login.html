{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card shadow auth-card"><div class="card-header bg-dark text-white"><h4 class="mb-0">Жүйеге кіру</h4></div><div class="card-body"><form method="POST"><div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" name="email" required></div><div class="mb-3"><label class="form-label">Құпиясөз</label><input type="password" class="form-control" name="password" required></div><button type="submit" class="btn btn-dark w-100">Кіру</button></form><p class="mt-3 text-center">Аккаунтыңыз жоқ па? <a href="{{ url_for('register') }}">Тіркелу</a></p></div></div></div></div>
{% endblock %}
